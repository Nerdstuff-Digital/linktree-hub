<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sammelkarten Links | Dein Name (TCG Holo-Foil)</title>
    <link rel="icon" href="../img/favicon.png">
    <link rel="stylesheet" href="style-tcg.css">
</head>
<body class="linktree-body">

    <main class="linktree-container">
        
        <a href="../index.html" class="action-btn top-left" aria-label="Zurück zur Übersicht">
            <img src="../icons/zuruck-pfeil.png" alt="Zurück" class="custom-icon back-icon">
        </a>

        <button id="share-btn" class="action-btn top-right" aria-label="Seite teilen">
            <img src="../icons/share.png" alt="Teilen" class="custom-icon share-icon">
        </button>

        <div class="linktree-profile">
            <div class="avatar-card">
                <img src="../img/logo.jpg" alt="Profilbild" class="linktree-logo">
            </div>
            <h1 class="linktree-title">TCG Master</h1>
            <p class="linktree-desc">Unboxings, Deck-Profile & Turniere! Finde hier meine seltensten Pulls und neuesten Videos.</p>
            
            <div class="social-icons-row">
                <a href="#" target="_blank" class="social-icon">
                    <img src="../icons/youtube.png" alt="YouTube" class="custom-icon profile-icon">
                </a>
                <a href="#" target="_blank" class="social-icon">
                    <img src="../icons/insta.png" alt="Instagram" class="custom-icon profile-icon">
                </a>
                <a href="#" target="_blank" class="social-icon">
                    <img src="../icons/tiktok.png" alt="TikTok" class="custom-icon profile-icon">
                </a>
            </div>
        </div>

        <div class="linktree-links">
            
            <a href="#" target="_blank" class="linktree-btn holo-card">
                <div class="link-icon">
                    <img src="../icons/youtube.png" alt="YouTube" class="custom-icon button-icon">
                </div>
                <span class="btn-text">Neuestes Display Unboxing</span>
            </a>

            <a href="#" target="_blank" class="linktree-btn holo-card">
                <div class="link-icon">
                    <img src="../icons/insta.png" alt="Instagram" class="custom-icon button-icon">
                </div>
                <span class="btn-text">Meine PSA/BGS Slabs</span>
            </a>

            <a href="#" target="_blank" class="linktree-btn holo-card">
                <div class="link-icon">
                    <img src="../icons/website.png" alt="Cardmarket" class="custom-icon button-icon">
                </div>
                <span class="btn-text">Mein Cardmarket Shop</span>
            </a>

            <a href="#" target="_blank" class="linktree-btn holo-card">
                <div class="link-icon">
                    <img src="../icons/tiktok.png" alt="TikTok" class="custom-icon button-icon">
                </div>
                <span class="btn-text">Schnelle Pulls auf TikTok</span>
            </a>

            <a href="#" target="_blank" class="linktree-btn holo-card">
                <div class="link-icon">
                    <img src="../icons/amazon.png" alt="Amazon" class="custom-icon button-icon">
                </div>
                <span class="btn-text">Sleeves & Toploader Empfehlungen</span>
            </a>

        </div>
        
        <footer class="legal-footer">
            <a href="../impressum.html">Impressum</a>
            <span>|</span>
            <a href="../datenschutz.html">Datenschutz</a>
        </footer>
        
    </main>

    <script>
        document.getElementById('share-btn').addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Meine TCG Links',
                        text: 'Schau dir meine neuesten Unboxings und Deck-Profile an!',
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('Teilen abgebrochen oder fehlgeschlagen', err);
                }
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Link wurde in die Zwischenablage kopiert!');
            }
        });
    </script>

</body>
</html>
