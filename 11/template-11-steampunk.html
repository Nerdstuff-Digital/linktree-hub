<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maker Links | Dein Name (Steampunk)</title>
    <link rel="icon" href="../img/favicon.png">
    <link rel="stylesheet" href="style-steampunk.css">
</head>
<body class="linktree-body">

    <main class="linktree-container">
        
        <a href="../index.html" class="action-btn top-left" aria-label="Zurück zur Übersicht">
            <img src="../icons/zuruck-pfeil.png" alt="Zurück" class="custom-icon back-icon">
        </a>

        <button id="share-btn" class="action-btn top-right" aria-label="Seite teilen">
            <img src="../icons/share.png" alt="Teilen" class="custom-icon share-icon">
        </button>

        <div class="linktree-profile">
            <div class="steampunk-avatar">
                <img src="../img/logo.jpg" alt="Profilbild" class="linktree-logo">
            </div>
            <h1 class="linktree-title">Herr der Zahnräder</h1>
            <p class="linktree-desc">DIY-Maker, 3D-Druck & Leder-Crafting. Willkommen in meiner Werkstatt! ⚙️🛠️</p>
            
            <div class="social-icons-row">
                <a href="#" target="_blank" class="social-icon">
                    <img src="../icons/youtube.png" alt="YouTube" class="custom-icon profile-icon">
                </a>
                <a href="#" target="_blank" class="social-icon">
                    <img src="../icons/insta.png" alt="Instagram" class="custom-icon profile-icon">
                </a>
                <a href="#" target="_blank" class="social-icon">
                    <img src="../icons/tiktok.png" alt="TikTok" class="custom-icon profile-icon">
                </a>
            </div>
        </div>

        <div class="linktree-links">
            
            <a href="#" target="_blank" class="linktree-btn brass-plate">
                <div class="link-icon">
                    <img src="../icons/youtube.png" alt="YouTube" class="custom-icon button-icon">
                </div>
                <span class="btn-text">Neuester Werkstatt-Vlog</span>
            </a>

            <a href="#" target="_blank" class="linktree-btn brass-plate">
                <div class="link-icon">
                    <img src="../icons/website.png" alt="Etsy" class="custom-icon button-icon">
                </div>
                <span class="btn-text">Mein Etsy-Shop für Props</span>
            </a>

            <a href="#" target="_blank" class="linktree-btn brass-plate">
                <div class="link-icon">
                    <img src="../icons/insta.png" alt="Instagram" class="custom-icon button-icon">
                </div>
                <span class="btn-text">Leder-Crafting Galerie</span>
            </a>

            <a href="#" target="_blank" class="linktree-btn brass-plate">
                <div class="link-icon">
                    <img src="../icons/tiktok.png" alt="TikTok" class="custom-icon button-icon">
                </div>
                <span class="btn-text">Quick-Builds auf TikTok</span>
            </a>

            <a href="#" target="_blank" class="linktree-btn brass-plate">
                <div class="link-icon">
                    <img src="../icons/cafe.png" alt="Patreon" class="custom-icon button-icon">
                </div>
                <span class="btn-text">Meine 3D-Druck Dateien (Patreon)</span>
            </a>

        </div>
        
        <footer class="legal-footer">
            <a href="../impressum.html">Impressum</a>
            <span>|</span>
            <a href="../datenschutz.html">Datenschutz</a>
        </footer>
        
    </main>

    <script>
        document.getElementById('share-btn').addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Meine Werkstatt Links',
                        text: 'Schau dir meine neuesten DIY-Projekte an!',
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('Teilen abgebrochen oder fehlgeschlagen', err);
                }
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Link wurde in die Zwischenablage kopiert!');
            }
        });
    </script>

</body>
</html>
